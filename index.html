<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NFL Skill Player Data Explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">TEMPORARY GITHUB PAGES PROTOTYPE · NFLVERSE DATA</p>
      <h1>NFL Skill Player Data Explorer</h1>
      <p class="subtitle">Filter, sort, summarize, and build small tables from 2015–2024 QB/RB/WR/TE player-game data.</p>
    </div>
    <div class="stats" id="statsBox">Loading dataset…</div>
  </header>

  <main>
    <section class="panel controls">
      <label>Season
        <select id="season"><option value="all">All seasons</option></select>
      </label>
      <label>Position
        <select id="position"><option value="">All</option></select>
      </label>
      <label>Team
        <select id="team"><option value="">All</option></select>
      </label>
      <label>Player search
        <input id="player" placeholder="e.g. McCaffrey, Chase, Mahomes" />
      </label>
      <label>Min PPR points
        <input id="minPpr" type="number" step="0.1" placeholder="optional" />
      </label>
      <label>Sort by
        <select id="sortBy">
          <option value="fantasy_points_ppr">PPR points</option>
          <option value="season">Season</option>
          <option value="week">Week</option>
          <option value="passing_yards">Passing yards</option>
          <option value="rushing_yards">Rushing yards</option>
          <option value="receiving_yards">Receiving yards</option>
          <option value="targets">Targets</option>
          <option value="carries">Carries</option>
          <option value="receptions">Receptions</option>
        </select>
      </label>
      <label>Direction
        <select id="sortDir"><option value="desc">Desc</option><option value="asc">Asc</option></select>
      </label>
      <button id="apply">Apply</button>
    </section>

    <section class="grid">
      <article class="panel summary">
        <h2>Summary</h2>
        <div id="summaryCards" class="summary-cards"></div>
      </article>
      <article class="panel builder">
        <h2>Table Builder</h2>
        <p>Pick columns for a smaller table.</p>
        <div id="columnPicker" class="checks"></div>
      </article>
    </section>

    <section class="panel table-panel">
      <div class="table-head">
        <div><h2>Results</h2><p id="resultMeta"></p></div>
        <div class="buttons"><button id="csvBtn">Download visible CSV</button></div>
      </div>
      <div class="table-wrap"><table id="results"></table></div>
    </section>
  </main>

<script src="app.js"></script>
</body>
</html>
